name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.config }} / ${{ matrix.compiler }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        compiler: [gcc, clang]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential clang python3

      - name: Select compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc" ]]; then
            echo "CC=gcc"  >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang"   >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: |
          SAN_FLAG=OFF
          if [[ "${{ matrix.config }}" == "Debug" ]]; then SAN_FLAG=ON; fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DSWIFTFIX_ENABLE_SANITIZERS=${SAN_FLAG}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Regenerate corpus (sanity check)
        run: |
          python3 corpus/generate.py --dry-run | head -40
